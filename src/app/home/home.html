<section class="hero" aria-labelledby="page-title">
  <p class="eyebrow">Topo Apps</p>
  <h1 id="page-title">Drei App-Einstiege für kommende Werkzeuge</h1>
  <p class="intro">
    Dieses Setup stellt nur die Angular-Struktur, Navigation und Platzhalterseiten bereit.
    Die fachlichen Funktionen werden später umgesetzt.
  </p>
</section>

<nav class="tile-grid" aria-label="App Einstiegspunkte">
  @for (tile of appTiles; track tile.route) {
    <a class="tile" [routerLink]="tile.route">
      <span class="tile__label">App</span>
      <strong>{{ tile.title }}</strong>
      <span>{{ tile.description }}</span>
    </a>
  }
</nav>
